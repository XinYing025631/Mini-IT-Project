<!DOCTYPE html>
<html>
<head>
    <title>Life Pages</title>

    <style>
        body {
            margin: 0;
            font-family: Arial;
        }

        .container {
            display: flex;
            height: 100vh;
        }

        /* Sidebar */
        .sidebar {
            width: 250px;
            border-right: 1px solid #ddd;
            padding: 15px;
        }

        .logo {
            font-weight: bold;
            margin-bottom: 20px;
        }

        .section-title {
            font-size: 12px;
            color: gray;
            margin-top: 20px;
            margin-bottom: 8px;
        }

        .menu-item {
            padding: 8px;
            border-radius: 8px;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .menu-item:hover {
            background: #f0f0f0;
        }

        .active {
            background: #e6e6e6;
        }

        /* Main */
        .main {
            flex: 1;
            padding: 20px;
        }

        input {
            padding: 6px;
            margin-top: 10px;
        }

        button {
            padding: 6px 10px;
            margin-top: 10px;
            cursor: pointer;
        }
    </style>
</head>

<body>

<div class="container">

    <!-- 左边 -->
    <div class="sidebar">

    <div class="logo">Life Pages</div>

    <div class="section-title">清单</div>

    <div class="menu-item active">📅 日历</div>
    <div class="menu-item">⏳ 倒数纪念日</div>
    <div class="menu-item">💼 工作任务</div>
    <div class="menu-item">📦 购物清单</div>
    <div class="menu-item">📘 学习安排</div>
    <div class="menu-item">🏠 个人备忘</div>
    <div class="menu-item">🏃 锻炼计划</div>
    <div class="menu-item">🦄 心愿清单</div>

    <div class="section-title">其他</div>

    <div class="menu-item">✔ 已完成</div>
    <div class="menu-item">🗑 垃圾桶</div>

</div>

    <!-- 右边 -->
    <div class="main">

        <h2>倒数纪念日</h2>

        <p>输入一个日期：</p>
        <input type="date" id="dateInput"><br>

        <button onclick="calculate()">计算倒数</button>

        <p id="result"></p>

    </div>

</div>

<script>
function calculate() {
    var inputDate = new Date(document.getElementById("dateInput").value);
    var today = new Date();

    var diff = inputDate - today;

    var days = Math.ceil(diff / (1000 * 60 * 60 * 24));

    if (!isNaN(days)) {
        document.getElementById("result").innerText = "还有 " + days + " 天";
    }
}
</script>

</body>
</html>
