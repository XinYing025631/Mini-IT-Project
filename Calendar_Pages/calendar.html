<!DOCTYPE html>
<html>
<head>
    <title>Calendar</title>

    <style>
        body {
            font-family: Arial;
            text-align: center;
            background-color: #f4f6fb;
        }

        /* 🌟 控制整体宽度 */
        .container {
            width: 800px;
            margin: auto;
        }

        /* 🌟 banner */
        .banner {
            width: 100%;
            margin-top: 20px;
        }

        .banner img {
            width: 100%;
            height: 220px;
            object-fit: cover;
            object-position: center 60%;
            border-radius: 15px;
        }

        /* 🌟 标题（参考图风格） */
        .title {
            margin-top: 12px;
            margin-bottom: 10px;
            font-size: 22px;
            font-weight: 600;
            color: #7a5c3e; /* 棕色 */
            letter-spacing: 1px;
        }

        /* 🌟 可选分层（更高级） */
        .month {
            font-size: 24px;
            font-weight: 700;
            color: #7a5c3e;
        }

        .year {
            font-size: 16px;
            color: #a68a6d;
            margin-left: 6px;
        }

        table {
            width: 100%;
            margin-top: 10px;
            border-collapse: separate;
            border-spacing: 10px;
        }

        th {
            color: #8e9cff;
            font-weight: bold;
        }

        td {
            width: 70px;
            height: 70px;
            background-color: white;
            border-radius: 15px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.05);
            transition: 0.2s;
        }

        td:hover {
            background-color: #e0e0ff;
            cursor: pointer;
        }

        .today {
            background-color: #8e9cff;
            color: white;
            font-weight: bold;
        }

        td:nth-child(1),
        td:nth-child(7) {
            color: #ff6b6b;
        }

        a {
            text-decoration: none;
            color: #8e9cff;
            font-weight: bold;
        }

        a:hover {
            text-decoration: underline;
        }
    </style>
</head>

<body>

<div class="container">

    <!-- 🌟 Banner -->
    <div class="banner">
        <img src="img/banner.jpg">
    </div>

    <!-- 🌟 标题 -->
    <h1 class="title">
        <span class="month">April</span>
        <span class="year">2026</span>
    </h1>

    <table>
        <tr>
            <th>Sun</th>
            <th>Mon</th>
            <th>Tue</th>
            <th>Wed</th>
            <th>Thu</th>
            <th>Fri</th>
            <th>Sat</th>
        </tr>

        <tr>
            <td></td><td></td><td></td><td>1</td><td>2</td><td>3</td><td>4</td>
        </tr>
        <tr>
            <td>5</td><td>6</td><td>7</td><td>8</td><td>9</td><td>10</td><td>11</td>
        </tr>
        <tr>
            <td>12</td><td class="today">13</td><td>14</td><td>15</td><td>16</td><td>17</td><td>18</td>
        </tr>
        <tr>
            <td>19</td><td>20</td><td>21</td><td>22</td><td>23</td><td>24</td><td>25</td>
        </tr>
        <tr>
            <td>26</td><td>27</td><td>28</td><td>29</td><td>30</td><td></td><td></td>
        </tr>
    </table>


</div>

</body>
</html>
